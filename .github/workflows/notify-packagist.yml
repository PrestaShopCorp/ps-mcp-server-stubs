name: Notify Packagist

on:
  release:
    types: [published]

jobs:
  packagist:
    name: Update Packagist
    runs-on: ubuntu-latest

    steps:
      - name: Notify Packagist of new version
        run: curl -s -X POST -H "Content-Type: application/json" "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" -d '{"repository":{"url":"https://github.com/PrestaShopCorp/ps-mcp-server-stubs"}}'
